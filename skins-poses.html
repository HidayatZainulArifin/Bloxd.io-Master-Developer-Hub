<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bloxd.io Master Skins & Poses</title>
    <style>
        body { font-family: 'Consolas', monospace; background-color: #0d0d0d; color: #e0e0e0; margin: 0; display: flex; }
        .sidebar { width: 250px; background: #1a1a1a; height: 100vh; position: fixed; border-right: 2px solid #bb86fc; padding: 20px; box-sizing: border-box; }
        .back-btn { display: block; background: #bb86fc; color: #000; text-decoration: none; padding: 12px; border-radius: 4px; font-weight: bold; text-align: center; margin-bottom: 20px; }
        .main-content { margin-left: 250px; padding: 20px; width: 100%; }
        h1 { color: #bb86fc; border-bottom: 2px solid #333; padding-bottom: 10px; }
        h2 { color: #cf6679; margin-top: 30px; }
        .search-box { width: 100%; padding: 12px; background: #1e1e1e; border: 1px solid #333; color: #bb86fc; border-radius: 4px; }
        .pose-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; margin: 20px 0; }
        .pose-card { background: #1e1e1e; padding: 15px; text-align: center; border-radius: 4px; border: 1px solid #333; color: #bb86fc; font-weight: bold; }
        .skin-section { background: #1a1a1a; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #2d2d2d; }
        .skin-title { color: #03dad6; font-size: 1.1rem; margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 5px; display: block; }
        .tag-container { display: flex; flex-wrap: wrap; gap: 5px; }
        .tag { background: #252526; color: #e0e0e0; padding: 3px 8px; border-radius: 3px; font-size: 0.75rem; border: 1px solid #333; }
    </style>
</head>
<body>
    <div class="sidebar">
        <a href="index.html" class="back-btn">🏠 Back To Hub</a>
        <p style="font-size: 0.8rem; color: #666;">Navigation:<br>Skins & Poses</p>
    </div>

    <div class="main-content">
        <h1>Master Skins & Poses</h1>
        <!-- Changed placeholder to English -->
        <input type="text" id="searchInput" class="search-box" placeholder="Search skins..." onkeyup="filterContent()">
        
        <h2>Poses</h2>
        <div class="pose-grid" id="poseGrid">
            <div class="pose-card">standing</div><div class="pose-card">sitting</div><div class="pose-card">zombie</div><div class="pose-card">gliding</div><div class="pose-card">driving</div><div class="pose-card">sleeping</div><div class="pose-card">riding</div>
        </div>

        <div id="dynamicSkins"></div>
    </div>

    <script>
        const skinData = { "Head": "head_0, head_1_0, head_1_1, head_1_2, head_1_3, head_1_4, head_2_0, head_2_1, head_2_2, head_2_3, head_2_4, head_3_0, head_3_1, head_3_2, head_3_3, head_3_4, head_4_0, head_4_1, head_4_2, head_4_3, head_4_4, head_5_0, head_5_1, head_5_2, head_5_3, head_5_4, head_6_0, head_6_1, head_6_2, head_6_3, head_6_4, head_7_0, head_7_1, head_7_2, head_7_3, head_7_4, head_8_0, head_8_1, head_8_2, head_8_3, head_8_4, head_9_0, head_9_1, head_9_2, head_9_3, head_9_4", "Body": "body_0_0, body_0_1, body_0_2, body_0_3, body_0_4, body_0_5, body_0_6, body_0_7, body_1_0, body_1_1, body_1_2, body_1_3, body_1_4, body_1_5, body_1_6, body_1_7, body_2_0, body_2_1, body_2_2, body_2_3, body_2_4, body_2_5, body_2_6, body_2_7, body_3_0, body_3_1, body_3_2, body_3_3, body_3_4, body_3_5, body_3_6, body_3_7, body_4_0, body_4_1, body_4_2, body_4_3, body_4_4, body_4_5, body_4_6, body_4_7, body_5_0, body_5_1, body_5_2, body_5_3, body_5_4, body_5_5, body_5_6, body_5_7, body_6_0, body_6_1, body_6_2, body_6_3, body_6_4, body_6_5, body_6_6, body_6_7" };
        function renderAll() {
            const container = document.getElementById('dynamicSkins');
            for (const [title, list] of Object.entries(skinData)) {
                const section = document.createElement('div');
                section.className = 'skin-section';
                section.innerHTML = `<span class="skin-title">${title}</span><div class="tag-container">${list.split(', ').map(s => `<div class="tag">${s}</div>`).join('')}</div>`;
                container.appendChild(section);
            }
        }
        function filterContent() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.tag, .pose-card').forEach(el => el.style.display = el.innerText.toLowerCase().includes(q) ? "" : "none");
        }
        renderAll();
    </script>
</body>
</html>
